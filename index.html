<!DOCTYPE html>
<html>
<head>
    <title>Raphael Case File</title>
    <style>
        body {
            background-color: #1a1a1a; /* Dark background */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .file-container {
            width: 95%;
            max-width: 1000px;
        }
        .file-image {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="file-container">
        <img src="background.jpg" alt="Raphael Case File" class="file-image">
    </div>

</body>
</html>
