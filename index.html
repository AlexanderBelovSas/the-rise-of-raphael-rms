<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael Case File</title>
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .file-container {
            width: 90%;
            max-width: 1100px;
            animation: fadeIn 2s;
        }
        .file-image {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
            border-radius: 4px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="file-container">
        <img id="mainImage" src="background.jpg" alt="Loading Archive..." class="file-image" 
             onerror="this.onerror=null; this.src='background.JPG';">
    </div>

</body>
</html>
